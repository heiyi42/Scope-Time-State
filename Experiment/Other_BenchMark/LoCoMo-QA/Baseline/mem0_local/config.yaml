# Mem0 self-host configuration for controlled local evaluation.
#
# Environment variables:
# - MEM0_LOCAL_BASE_URL: Mem0 self-host API URL, e.g. http://localhost:8888
# - MEM0_LOCAL_API_KEY: Mem0 self-host API key for X-API-Key auth.
#   Leave empty only when the server is started with AUTH_DISABLED=true.

name: "mem0_local"
version: "1.0"
description: "Mem0 self-host adapter for controlled local evaluation"

api_url: "${MEM0_LOCAL_BASE_URL:http://localhost:8888}"
api_key: "${MEM0_LOCAL_API_KEY:}"

batch_size: 30
max_retries: 5
add_interval: 0.5
requests_per_second: 5
http_timeout: 120

search:
  top_k: 10
