# Shared pipeline settings — used by answerer.py, evaluator.py, pipeline.py
# regardless of which --system is selected.

# Answer generation (answerer.py)
answer:
  api_key: "${LLM_API_KEY:local}"
  base_url: "${LLM_BASE_URL:http://127.0.0.1:8000/v1}"
  model: "${LLM_ANSWER_MODEL:Qwen2.5-1.5B-Instruct}"
  provider: null
  temperature: 0
  max_tokens: 1000
  timeout: 300
  concurrency: ${LLM_ANSWER_CONCURRENCY:1}

# LLM judge evaluation (evaluator.py)
evaluate:
  api_key: "${LLM_API_KEY:local}"
  base_url: "${LLM_BASE_URL:http://127.0.0.1:8000/v1}"
  model: "${LLM_JUDGE_MODEL:Qwen2.5-1.5B-Instruct}"
  provider: null
  concurrency: ${LLM_JUDGE_CONCURRENCY:2}

# Search stage (pipeline.py)
search:
  concurrency: ${EVERMEMBENCH_SEARCH_CONCURRENCY:2}
  timeout: 120

# Retry (shared by answerer, evaluator, search)
retry:
  max_retries: 20
  retry_delay: 1.0
  max_delay: 300

# Debug
debug:
  show_usage: false  

# Cache warmup (LLM system only — sends first request, waits, then batch processes)
warmup:
  enabled: true
  delay_seconds: 15
