<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Scope-Time-State Graph case study for aaai_status</title>
  <desc id="desc">A paper-style trace diagram showing query interpretation, event evidence, claim validity, state facets, and answer trace for the AAAI status case.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b42318"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #d8dee9; stroke-width: 1.2; }
      .panel-title { font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 16px; fill: #475569; }
      .node-title { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .node-text { font-family: Inter, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .edge-label { font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #334155; }
      .query { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.6; }
      .event { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.6; }
      .claim { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.6; }
      .rejected { fill: #fff1f2; stroke: #e11d48; stroke-width: 1.8; }
      .state { fill: #ecfdf5; stroke: #059669; stroke-width: 1.8; }
      .answer { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.8; }
      .edge { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow); }
      .edge-red { fill: none; stroke: #b42318; stroke-width: 2.4; marker-end: url(#arrow-red); }
      .edge-dashed { fill: none; stroke: #b42318; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow-red); }
      .legend { font-family: Inter, Arial, sans-serif; font-size: 13px; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="980"/>
  <text class="title" x="70" y="56">Figure 1. Explainable Trace for a Multi-Facet Project State</text>
  <text class="subtitle" x="70" y="84">Case aaai_status: the current answer is derived from state facets, while the old KG-RAG direction remains traceable as superseded context.</text>

  <rect class="panel" x="55" y="120" width="300" height="740" rx="12"/>
  <text class="panel-title" x="80" y="154">Query Interpretation</text>

  <rect class="panel" x="390" y="120" width="320" height="740" rx="12"/>
  <text class="panel-title" x="415" y="154">Event Evidence</text>

  <rect class="panel" x="745" y="120" width="350" height="740" rx="12"/>
  <text class="panel-title" x="770" y="154">Claims and Validity</text>

  <rect class="panel" x="1130" y="120" width="330" height="740" rx="12"/>
  <text class="panel-title" x="1155" y="154">State Facets</text>

  <rect class="panel" x="1500" y="120" width="245" height="740" rx="12"/>
  <text class="panel-title" x="1525" y="154">Answer</text>

  <rect class="query" x="80" y="205" width="250" height="92" rx="10"/>
  <text class="node-title" x="104" y="235">Query</text>
  <text class="node-text" x="104" y="260">"AAAI project status?"</text>
  <text class="node-text" x="104" y="282">state_summary</text>

  <rect class="query" x="80" y="360" width="250" height="82" rx="10"/>
  <text class="node-title" x="104" y="390">Scope</text>
  <text class="node-text" x="104" y="415">aaai_memory</text>

  <rect class="query" x="80" y="505" width="250" height="82" rx="10"/>
  <text class="node-title" x="104" y="535">Time Role</text>
  <text class="node-text" x="104" y="560">updated_at</text>

  <rect class="rejected" x="425" y="200" width="250" height="102" rx="10"/>
  <text class="node-title" x="450" y="230">aaai_e2</text>
  <text class="node-text" x="450" y="255">old idea:</text>
  <text class="node-text" x="450" y="277">multi-time-field + KG-RAG</text>

  <rect class="event" x="425" y="380" width="250" height="102" rx="10"/>
  <text class="node-title" x="450" y="410">aaai_e3</text>
  <text class="node-text" x="450" y="435">TSM already covers</text>
  <text class="node-text" x="450" y="457">dialogue vs occurrence time</text>

  <rect class="event" x="425" y="590" width="250" height="116" rx="10"/>
  <text class="node-title" x="450" y="620">aaai_e4</text>
  <text class="node-text" x="450" y="645">pivot to Latest Valid</text>
  <text class="node-text" x="450" y="667">State Retrieval</text>
  <text class="node-text" x="450" y="689">and STAMB-State</text>

  <rect class="rejected" x="785" y="205" width="270" height="92" rx="10"/>
  <text class="node-title" x="810" y="235">Rejected claim</text>
  <text class="node-text" x="810" y="260">old KG-RAG direction</text>
  <text class="node-text" x="810" y="282">not current state</text>

  <rect class="claim" x="785" y="365" width="270" height="82" rx="10"/>
  <text class="node-title" x="810" y="395">Claim</text>
  <text class="node-text" x="810" y="420">TSM-overlap risk</text>

  <rect class="claim" x="785" y="495" width="270" height="82" rx="10"/>
  <text class="node-title" x="810" y="525">Claim</text>
  <text class="node-text" x="810" y="550">scope-time routing weak</text>

  <rect class="claim" x="785" y="625" width="270" height="82" rx="10"/>
  <text class="node-title" x="810" y="655">Claim</text>
  <text class="node-text" x="810" y="680">main direction is LVSR</text>

  <rect class="claim" x="785" y="755" width="270" height="82" rx="10"/>
  <text class="node-title" x="810" y="785">Claim</text>
  <text class="node-text" x="810" y="810">build STAMB-State</text>

  <rect class="state" x="1165" y="250" width="255" height="102" rx="10"/>
  <text class="node-title" x="1190" y="280">current_decision</text>
  <text class="node-text" x="1190" y="305">LVSR is the current</text>
  <text class="node-text" x="1190" y="327">research direction</text>

  <rect class="state" x="1165" y="430" width="255" height="116" rx="10"/>
  <text class="node-title" x="1190" y="460">risk</text>
  <text class="node-text" x="1190" y="485">TSM overlap + weak</text>
  <text class="node-text" x="1190" y="507">scope-time routing</text>
  <text class="node-text" x="1190" y="529">claim</text>

  <rect class="state" x="1165" y="630" width="255" height="102" rx="10"/>
  <text class="node-title" x="1190" y="660">next_step</text>
  <text class="node-text" x="1190" y="685">construct STAMB-State</text>
  <text class="node-text" x="1190" y="707">benchmark</text>

  <rect class="answer" x="1530" y="380" width="185" height="180" rx="12"/>
  <text class="node-title" x="1555" y="415">Final answer</text>
  <text class="node-text" x="1555" y="445">current decision</text>
  <text class="node-text" x="1555" y="470">+ risk</text>
  <text class="node-text" x="1555" y="495">+ next step</text>
  <text class="node-text" x="1555" y="530">all backed by</text>
  <text class="node-text" x="1555" y="552">support events</text>

  <path class="edge-soft" d="M330 251 C360 251, 370 401, 425 431"/>
  <path class="edge-soft" d="M330 401 C370 401, 380 401, 425 431"/>
  <path class="edge-soft" d="M330 546 C365 546, 380 646, 425 648"/>

  <path class="edge" d="M675 251 C720 251, 735 251, 785 251"/>
  <path class="edge" d="M675 431 C720 431, 735 406, 785 406"/>
  <path class="edge" d="M675 648 C720 648, 735 536, 785 536"/>
  <path class="edge" d="M675 648 C720 648, 735 666, 785 666"/>
  <path class="edge" d="M675 648 C720 648, 735 796, 785 796"/>

  <path class="edge-red" d="M785 666 C710 610, 710 300, 785 251"/>
  <text class="edge-label" x="690" y="470" transform="rotate(-82 690 470)">SUPERSEDES</text>

  <path class="edge" d="M1055 666 C1110 666, 1110 301, 1165 301"/>
  <path class="edge" d="M1055 406 C1110 406, 1110 480, 1165 480"/>
  <path class="edge" d="M1055 536 C1110 536, 1110 488, 1165 488"/>
  <path class="edge" d="M1055 796 C1110 796, 1110 681, 1165 681"/>

  <path class="edge" d="M1420 301 C1475 301, 1485 430, 1530 430"/>
  <path class="edge" d="M1420 488 C1470 488, 1485 470, 1530 470"/>
  <path class="edge" d="M1420 681 C1475 681, 1485 510, 1530 510"/>

  <rect x="70" y="895" width="1660" height="46" rx="10" fill="#f8fafc" stroke="#d8dee9"/>
  <circle cx="105" cy="918" r="7" fill="#eff6ff" stroke="#2563eb"/>
  <text class="legend" x="120" y="923">Event evidence</text>
  <circle cx="250" cy="918" r="7" fill="#fff7ed" stroke="#ea580c"/>
  <text class="legend" x="265" y="923">Claim</text>
  <circle cx="365" cy="918" r="7" fill="#ecfdf5" stroke="#059669"/>
  <text class="legend" x="380" y="923">State facet</text>
  <circle cx="505" cy="918" r="7" fill="#fff1f2" stroke="#e11d48"/>
  <text class="legend" x="520" y="923">Rejected or superseded context</text>
  <text class="legend" x="765" y="923">Key idea: the answer is derived from facets and support paths, not from the latest event alone.</text>
</svg>
