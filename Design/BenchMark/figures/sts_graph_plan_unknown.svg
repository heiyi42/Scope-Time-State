<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Scope-Time-State Graph case study for plan-only completion uncertainty</title>
  <desc id="desc">A paper-style trace diagram showing that a planned calibration event does not entail completion, producing an unknown-current state with provenance.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b42318"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #d8dee9; stroke-width: 1.2; }
      .panel-title { font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 16px; fill: #475569; }
      .node-title { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .node-text { font-family: Inter, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .edge-label { font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #334155; }
      .query { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.6; }
      .event { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.6; }
      .claim { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.6; }
      .rejected { fill: #fff1f2; stroke: #e11d48; stroke-width: 1.8; }
      .state { fill: #ecfdf5; stroke: #059669; stroke-width: 1.8; }
      .answer { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.8; }
      .edge { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow); }
      .edge-red { fill: none; stroke: #b42318; stroke-width: 2.4; marker-end: url(#arrow-red); }
      .edge-dashed { fill: none; stroke: #b42318; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow-red); }
      .legend { font-family: Inter, Arial, sans-serif; font-size: 13px; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="980"/>
  <text class="title" x="70" y="56">Figure 2. Traceable Unknown-Current State From Plan-Only Evidence</text>
  <text class="subtitle" x="70" y="84">Case robot_calibration_completion_unknown: a plan is valid evidence, but it does not prove completion.</text>

  <rect class="panel" x="55" y="120" width="300" height="740" rx="12"/>
  <text class="panel-title" x="80" y="154">Query Interpretation</text>

  <rect class="panel" x="390" y="120" width="360" height="740" rx="12"/>
  <text class="panel-title" x="415" y="154">Candidate Events</text>

  <rect class="panel" x="790" y="120" width="330" height="740" rx="12"/>
  <text class="panel-title" x="815" y="154">Claims and Filtering</text>

  <rect class="panel" x="1160" y="120" width="300" height="740" rx="12"/>
  <text class="panel-title" x="1185" y="154">State Facet</text>

  <rect class="panel" x="1500" y="120" width="245" height="740" rx="12"/>
  <text class="panel-title" x="1525" y="154">Answer</text>

  <rect class="query" x="80" y="205" width="250" height="112" rx="10"/>
  <text class="node-title" x="104" y="235">Query</text>
  <text class="node-text" x="104" y="260">"Has depth-camera</text>
  <text class="node-text" x="104" y="282">extrinsic calibration</text>
  <text class="node-text" x="104" y="304">been completed?"</text>

  <rect class="query" x="80" y="380" width="250" height="82" rx="10"/>
  <text class="node-title" x="104" y="410">Scope</text>
  <text class="node-text" x="104" y="435">robot_nav</text>

  <rect class="query" x="80" y="525" width="250" height="92" rx="10"/>
  <text class="node-title" x="104" y="555">Time Roles</text>
  <text class="node-text" x="104" y="580">updated_at + planned_for</text>

  <rect class="rejected" x="430" y="185" width="280" height="86" rx="10"/>
  <text class="node-title" x="455" y="215">robot_e1</text>
  <text class="node-text" x="455" y="240">old lidar-only direction</text>

  <rect class="rejected" x="430" y="310" width="280" height="86" rx="10"/>
  <text class="node-title" x="455" y="340">robot_e2</text>
  <text class="node-text" x="455" y="365">stale / hard negative</text>

  <rect class="event" x="430" y="435" width="280" height="86" rx="10"/>
  <text class="node-title" x="455" y="465">robot_e3</text>
  <text class="node-text" x="455" y="490">localization drift issue</text>

  <rect class="event" x="430" y="560" width="280" height="86" rx="10"/>
  <text class="node-title" x="455" y="590">robot_e4</text>
  <text class="node-text" x="455" y="615">lidar + depth fusion</text>

  <rect class="event" x="430" y="700" width="280" height="102" rx="10"/>
  <text class="node-title" x="455" y="730">robot_e5</text>
  <text class="node-text" x="455" y="755">plan: calibrate depth</text>
  <text class="node-text" x="455" y="777">camera extrinsics</text>

  <rect class="rejected" x="830" y="190" width="250" height="86" rx="10"/>
  <text class="node-title" x="855" y="220">Rejected claim</text>
  <text class="node-text" x="855" y="245">old direction</text>

  <rect class="rejected" x="830" y="330" width="250" height="86" rx="10"/>
  <text class="node-title" x="855" y="360">Rejected claim</text>
  <text class="node-text" x="855" y="385">stale distractor</text>

  <rect class="claim" x="830" y="690" width="250" height="118" rx="10"/>
  <text class="node-title" x="855" y="720">Accepted claim</text>
  <text class="node-text" x="855" y="745">calibration is planned</text>
  <text class="node-text" x="855" y="767">but no completion</text>
  <text class="node-text" x="855" y="789">record exists</text>

  <rect class="state" x="1195" y="420" width="230" height="150" rx="12"/>
  <text class="node-title" x="1220" y="452">completion_status</text>
  <text class="node-text" x="1220" y="482">unknown_current</text>
  <text class="node-text" x="1220" y="512">only planned;</text>
  <text class="node-text" x="1220" y="534">not confirmed</text>
  <text class="node-text" x="1220" y="556">as completed</text>

  <rect class="answer" x="1530" y="420" width="185" height="150" rx="12"/>
  <text class="node-title" x="1555" y="452">Final answer</text>
  <text class="node-text" x="1555" y="482">cannot confirm</text>
  <text class="node-text" x="1555" y="507">completion</text>
  <text class="node-text" x="1555" y="542">support: robot_e5</text>

  <path class="edge-soft" d="M330 261 C365 261, 380 751, 430 751"/>
  <path class="edge-soft" d="M330 421 C365 421, 380 751, 430 751"/>
  <path class="edge-soft" d="M330 571 C365 571, 380 751, 430 751"/>

  <path class="edge-dashed" d="M710 228 C760 228, 780 233, 830 233"/>
  <path class="edge-dashed" d="M710 353 C760 353, 780 373, 830 373"/>
  <path class="edge" d="M710 751 C760 751, 780 749, 830 749"/>

  <path class="edge" d="M1080 749 C1140 749, 1140 495, 1195 495"/>
  <text class="edge-label" x="1100" y="645" transform="rotate(-68 1100 645)">plan-only evidence</text>

  <path class="edge-dashed" d="M1080 373 C1135 373, 1145 455, 1195 470"/>
  <text class="edge-label" x="1118" y="405">rejected</text>

  <path class="edge" d="M1425 495 C1475 495, 1485 495, 1530 495"/>

  <rect x="70" y="895" width="1660" height="46" rx="10" fill="#f8fafc" stroke="#d8dee9"/>
  <circle cx="105" cy="918" r="7" fill="#eff6ff" stroke="#2563eb"/>
  <text class="legend" x="120" y="923">Candidate event</text>
  <circle cx="255" cy="918" r="7" fill="#fff7ed" stroke="#ea580c"/>
  <text class="legend" x="270" y="923">Accepted claim</text>
  <circle cx="405" cy="918" r="7" fill="#fff1f2" stroke="#e11d48"/>
  <text class="legend" x="420" y="923">Rejected claim or hard negative</text>
  <circle cx="665" cy="918" r="7" fill="#ecfdf5" stroke="#059669"/>
  <text class="legend" x="680" y="923">Unknown-current state facet</text>
  <text class="legend" x="930" y="923">Key idea: a planned action is evidence of intent, not evidence of completion.</text>
</svg>
